name: Deploy

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  # Superseded PR previews are safe to cancel; production deploys are not
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    # Skip fork PRs: they can't access the deploy secrets
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage site files
        run: |
          mkdir -p dist
          cp index.html dist/

      # PRs deploy under a preview alias derived from the PR number, never the
      # branch name — a branch named "master" must not reach production.
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cosmo-quotes --branch=${{ github.event_name == 'push' && 'master' || format('preview-pr-{0}', github.event.number) }}

      - name: Comment preview link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        with:
          script: |
            const url = process.env.ALIAS_URL || process.env.DEPLOYMENT_URL;
            if (!url) {
              core.setFailed('Deploy succeeded but no preview URL was captured from wrangler-action outputs.');
              return;
            }
            const marker = '<!-- preview-link -->';
            const body = [
              marker,
              '### 🌐 Preview this change',
              '',
              `Click here to see the site with this change applied: ${url}`,
              '',
              '_The preview shows example data — your real prices, settings, and saved quotes are not affected._',
              '',
              '_Looks good? Press **Merge pull request** below and it goes live on the real site about a minute later._',
            ].join('\n');
            // Post a fresh comment each time so the owner gets a notification,
            // then clear older ones. Create before delete: if cleanup fails the
            // PR still has a live preview link.
            const { data: created } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const c of comments) {
              if (c.id !== created.id && c.body && c.body.startsWith(marker)) {
                try {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: c.id,
                  });
                } catch (e) {
                  core.warning(`Could not delete stale preview comment ${c.id}: ${e.message}`);
                }
              }
            }
